; Example PlatformIO config for the Cheap Yellow Display (ESP32-2432S028).
; Copy this file to `platformio.ini` (which is gitignored) to build:
;
;     cp platformio.example.ini platformio.ini
;
; This config is self-contained: it does NOT rely on an external Arduino
; libraries folder. TFT_eSPI is configured entirely via build_flags below and
; LVGL/ArduinoJson/XPT2046 are pulled in as managed dependencies.
;
; Board variant note: this targets the dual-USB CYD (CH340), which ships with an
; ST7789 panel. If the screen is blank, mirrored, or colors are wrong, see the
; "DISPLAY TWEAKS" comments below for the values to flip.

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
upload_speed = 460800
board_build.filesystem = spiffs
; Larger app partition (1.9 MB app / ~190 KB SPIFFS). The default scheme left the
; firmware at ~93% flash; touch + the extra UI need the headroom. The web UI in
; data/ is only ~60 KB, so it still fits the smaller SPIFFS. NOTE: changing the
; partition layout requires a one-time `pio run -t uploadfs` after flashing.
board_build.partitions = min_spiffs.csv

build_flags =
    -I include
    ; ---- LVGL: use the bundled include/lv_conf.h (v8.3) ----
    -D LV_CONF_INCLUDE_SIMPLE
    ; ---- TFT_eSPI display config for CYD (ESP32-2432S028) ----
    -D USER_SETUP_LOADED=1
    ; DISPLAY TWEAKS: dual-USB CYD = ST7789. If wrong, try ILI9341_2_DRIVER instead.
    -D ST7789_DRIVER=1
    -D TFT_WIDTH=240
    -D TFT_HEIGHT=320
    -D TFT_MISO=12
    -D TFT_MOSI=13
    -D TFT_SCLK=14
    -D TFT_CS=15
    -D TFT_DC=2
    -D TFT_RST=-1
    ; DISPLAY TWEAKS: if reds/blues are swapped, change TFT_BGR -> TFT_RGB.
    -D TFT_RGB_ORDER=TFT_BGR
    ; This CYD2USB ST7789 panel defaults to inverted colors (dark theme rendered as
    ; light, cyan shown as red, purple as green). Forcing inversion OFF corrects it.
    ; If the image ever looks like a photo negative again, switch to TFT_INVERSION_ON.
    -D TFT_INVERSION_OFF
    -D LOAD_GLCD=1
    -D LOAD_FONT2=1
    -D LOAD_FONT4=1
    -D LOAD_FONT6=1
    -D LOAD_FONT7=1
    -D LOAD_FONT8=1
    -D LOAD_GFXFF=1
    -D SMOOTH_FONT=1
    -D SPI_FREQUENCY=55000000
    -D SPI_READ_FREQUENCY=20000000

lib_deps =
    bblanchon/ArduinoJson @ ^6.21.3
    bodmer/TFT_eSPI @ ^2.5.43
    lvgl/lvgl @ ^8.3.11
    https://github.com/PaulStoffregen/XPT2046_Touchscreen.git
